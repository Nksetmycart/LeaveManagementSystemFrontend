<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light p-4 page-container animate-fade-in">
  <div class="card border-0 shadow-lg text-center p-5 rounded-4 bg-white mx-auto" style="max-width: 500px;">
    
    <!-- Top Animated Security Shield Icon Badge -->
    <div class="d-flex justify-content-center mb-4">
      <div class="rounded-circle bg-danger-subtle p-4 d-flex align-items-center justify-content-center text-danger animation-bounce" style="width: 100px; height: 100px;">
        <i class="bi bi-shield-slash-fill display-4"></i>
      </div>
    </div>

    <!-- Main Dynamic Error Context Messages Row -->
    <h1 class="fw-black text-dark display-5 mb-2">401</h1>
    <h2 class="fw-bold text-secondary h4 mb-3">Unauthorized Access</h2>
    <p class="text-muted fs-7 px-3 text-wrap-pretty mb-4">
      Oops! You don't have the required administrative clearance permissions or active session tokens to look at this database matrix route profile module.
    </p>

    <hr class="text-muted opacity-25 my-4">

    <!-- Action Actionable Flow Control Footers Strip Panel -->
    <div class="d-flex flex-column gap-2 w-100">
      <button 
        (click)="navigateToDashboard()" 
        class="btn btn-primary btn-md rounded-3 py-2.5 fw-semibold shadow-none text-white border-0 transition-all d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-house-door-fill fs-6"></i> Return to Safety
      </button>
      
      <button 
        (click)="logoutAndRedirect()" 
        class="btn btn-outline-secondary btn-md rounded-3 py-2.5 fw-semibold shadow-none border transition-all d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-box-arrow-right fs-6"></i> Sign In to Different Account
      </button>
    </div>

  </div>
</div>
