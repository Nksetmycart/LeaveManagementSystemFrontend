<div class="container-fluid p-0 page-container animate-fade-in">
  
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <span class="text-muted text-uppercase fw-bold tracking-wider fs-7 d-block mb-1" style="font-size: 0.7rem; letter-spacing: 0.08em;">Organization Calendar</span>
      <h1 class="fw-bold text-dark h2 mb-0">Holidays</h1>
    </div>
    <button [routerLink]="['/dashboard', 'holidays', 'add']" class="btn btn-primary d-flex align-items-center px-3 py-2 rounded-3 fw-medium shadow-none text-white fs-6">
      <i class="bi bi-calendar-plus me-2 fs-5"></i> Add holiday
    </button>
  </div>

  <div class="row g-3">
    <!-- Handles layout fallback visualization state loop when array contains zero entries -->
    <div class="col-12" *ngIf="holidayList.length === 0">
      <div class="card border-0 shadow-sm p-5 text-center rounded-4 text-muted bg-light">
        <i class="bi bi-calendar-x fs-1 mb-2 text-secondary"></i>
        <p class="mb-0 fw-medium fs-7">No company holiday configurations loaded from database matrix profiles.</p>
      </div>
    </div>

    <div class="col-12 col-md-6 col-xl-4" *ngFor="let holiday of holidayList">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-3 type-card d-flex flex-column justify-content-between">
        
        <div class="w-100">
          <div class="d-flex align-items-start justify-content-between">
            <div class="d-flex align-items-center overflow-hidden">
              <!-- Visual Accent decoration shifting based on type field values -->
              <div class="icon-badge rounded-3 d-flex align-items-center justify-content-center me-3 flex-shrink-0"
                   [ngClass]="holiday.type === 'Public' ? 'bg-danger-subtle text-danger' : 'bg-warning-subtle text-warning'">
                <i class="bi bi-gift fs-5"></i>
              </div>

              <div class="overflow-hidden">
                <h3 class="fw-bold text-dark mb-0 fs-6 text-truncate">{{ holiday.name }}</h3>
                <!-- Custom localized date string formatting hook mapping -->
                <span class="text-secondary d-block fs-7 mt-0.5">
                  <i class="bi bi-clock me-1 text-muted"></i> {{ holiday.date | date:'fullDate' }}
                </span>
              </div>
            </div>

            <button (click)="deleteHoliday(holiday); $event.stopPropagation()" class="btn btn-link text-muted p-2 rounded-circle border-0 action-trash shadow-none flex-shrink-0">
              <i class="bi bi-trash3 fs-6"></i>
            </button>
          </div>

          <div class="mt-3">
            <span class="badge px-2 py-1 rounded-2 fs-8 fw-semibold"
                  [ngClass]="holiday.type === 'Public' ? 'bg-danger-subtle text-danger' : 'bg-warning-subtle text-warning'">
              {{ holiday.type }} Category
            </span>
          </div>
        </div>

      </div>
    </div>
  </div>

</div>
