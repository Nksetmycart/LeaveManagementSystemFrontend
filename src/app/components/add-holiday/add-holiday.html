<div class="container-fluid p-0 page-container animate-fade-in">
  
  <div class="d-flex align-items-center mb-4 gap-3">
    <button [routerLink]="['/dashboard', 'holidays']" class="btn btn-light rounded-3 shadow-none border p-2 d-flex align-items-center justify-content-center">
      <i class="bi bi-arrow-left fs-5"></i>
    </button>
    <div>
      <span class="text-muted text-uppercase fw-bold tracking-wider fs-7 d-block mb-1" style="font-size: 0.7rem; letter-spacing: 0.08em;">Calendar Settings</span>
      <h1 class="fw-bold text-dark h2 mb-0">Add Holiday</h1>
    </div>
  </div>

  <div *ngIf="notification.show" 
       class="alert alert-dismissible fade show border-0 rounded-4 p-3 mb-4 max-width-form d-flex align-items-center justify-content-between shadow-sm"
       [ngClass]="notification.type === 'success' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'"
       role="alert">
    <div class="d-flex align-items-center">
      <i class="bi me-2 fs-5" [ngClass]="notification.type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
      <span class="fw-medium fs-7">{{ notification.message }}</span>
    </div>
    <button type="button" class="btn-close shadow-none" (click)="closeNotification()" aria-label="Close"></button>
  </div>

  <div class="card border-0 shadow-sm rounded-4 p-4 max-width-form">
    <form #holidayForm="ngForm" (ngSubmit)="onSubmit(holidayForm)" novalidate>
      
      <!-- Holiday Title Input -->
      <div class="mb-3">
        <label for="name" class="form-label fw-semibold text-dark fs-7">Holiday Name</label>
        <input 
          type="text" 
          id="name" 
          name="name"
          #nameCtrl="ngModel"
          [(ngModel)]="holidayData.name"
          required
          minlength="3"
          class="form-control rounded-3 shadow-none" 
          placeholder="e.g., Independence Day, New Year"
          [ngClass]="{ 'is-invalid': nameCtrl.touched && nameCtrl.errors }"
        />
        <div *ngIf="nameCtrl.touched && nameCtrl.errors" class="invalid-feedback">
          <span *ngIf="nameCtrl.errors['required']">Holiday title label is strictly required.</span>
          <span *ngIf="nameCtrl.errors['minlength']">Must be at least 3 characters.</span>
        </div>
      </div>

      <!-- Holiday Type Selection Dropdown -->
      <div class="mb-3">
        <label for="type" class="form-label fw-semibold text-dark fs-7">Holiday Type</label>
        <select 
          id="type" 
          name="type"
          [(ngModel)]="holidayData.type"
          class="form-select rounded-3 shadow-none"
        >
          <option value="Public">Public / National Holiday</option>
          <option value="Restricted">Restricted Holiday</option>
          <option value="CompanySpecific">Company-Wide / Optional Holiday</option>
        </select>
      </div>

      <!-- Date Selection Input picker -->
      <div class="mb-4">
        <label for="date" class="form-label fw-semibold text-dark fs-7">Holiday Date</label>
        <input 
          type="date" 
          id="date" 
          name="date"
          #dateCtrl="ngModel"
          [(ngModel)]="holidayData.date"
          required
          class="form-control rounded-3 shadow-none" 
          [ngClass]="{ 'is-invalid': dateCtrl.touched && dateCtrl.errors }"
        />
        <div *ngIf="dateCtrl.touched && dateCtrl.errors" class="invalid-feedback">
          <span>Please supply a valid validation calendar calendar scheduling parameter day.</span>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3">
        <button type="button" [routerLink]="['/dashboard', 'holidays']" class="btn btn-light rounded-3 px-4 py-2 fw-semibold fs-7 border shadow-none">
          Cancel
        </button>
        <button type="submit" [disabled]="isSubmitting" class="btn btn-primary rounded-3 px-4 py-2 fw-semibold fs-7 shadow-none text-white d-flex align-items-center">
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ isSubmitting ? 'Saving System Entry...' : 'Deploy Holiday' }}
        </button>
      </div>

    </form>
  </div>

</div>
