<div class="container-fluid p-0 page-container animate-fade-in">
  
  <!-- Back Button & Header Navigation Map Row -->
  <div class="d-flex align-items-center mb-4 gap-3">
    <button [routerLink]="['/dashboard', 'roles']" class="btn btn-light rounded-3 shadow-none border p-2 d-flex align-items-center justify-content-center">
      <i class="bi bi-arrow-left fs-5"></i>
    </button>
    <div>
      <span class="text-muted text-uppercase fw-bold tracking-wider fs-7 d-block mb-1" style="font-size: 0.7rem; letter-spacing: 0.08em;">Security</span>
      <h1 class="fw-bold text-dark h2 mb-0">Add Role</h1>
    </div>
  </div>

  <!-- Non-Alert Custom Background Context Banner Status Notification Node -->
  <div *ngIf="notification.show" 
       class="alert alert-dismissible fade show border-0 rounded-4 p-3 mb-4 max-width-form d-flex align-items-center justify-content-between shadow-sm"
       [ngClass]="notification.type === 'success' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'"
       role="alert">
    <div class="d-flex align-items-center">
      <i class="bi me-2 fs-5" [ngClass]="notification.type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'"></i>
      <span class="fw-medium fs-7">{{ notification.message }}</span>
    </div>
    <button type="button" class="btn-close shadow-none" (click)="closeNotification()" aria-label="Close"></button>
  </div>

  <!-- Form Deployment Layout Block -->
  <div class="card border-0 shadow-sm rounded-4 p-4 max-width-form">
    <form #roleForm="ngForm" (ngSubmit)="onSubmit(roleForm)" novalidate>
      
      <!-- Input parameter: Role Name String -->
      <div class="mb-4">
        <label for="name" class="form-label fw-semibold text-dark fs-7">Role Name</label>
        <input 
          type="text" 
          id="name" 
          name="name"
          #nameCtrl="ngModel"
          [(ngModel)]="roleData.name"
          required
          minlength="2"
          class="form-control rounded-3 shadow-none" 
          placeholder="e.g., Supervisor, TechnicalLead, FinanceAuditor"
          [ngClass]="{ 'is-invalid': nameCtrl.touched && nameCtrl.errors }"
        />
        <div *ngIf="nameCtrl.touched && nameCtrl.errors" class="invalid-feedback">
          <span *ngIf="nameCtrl.errors['required']">A role name label identifier string is required.</span>
          <span *ngIf="nameCtrl.errors['minlength']">Must be at least 2 characters long.</span>
        </div>
      </div>

      <!-- Toggle Switch: Activation Control State -->
      <div class="bg-light rounded-4 p-3 mb-4">
        <h6 class="fw-bold text-secondary text-uppercase fs-7 mb-3 tracking-wider" style="font-size: 0.65rem;">System Configuration State</h6>
        
        <div class="form-check form-switch mb-0">
          <input 
            class="form-check-input shadow-none" 
            type="checkbox" 
            role="switch" 
            id="isActive" 
            name="isActive" 
            [(ngModel)]="roleData.isActive"
          >
          <label class="form-check-label fw-medium text-dark ms-2 fs-7" role="button" for="isActive">
            Active Status Flag
            <span class="text-muted fw-normal d-block fs-8">Determines if this system authorization layer can be actively mapped onto an employee card.</span>
          </label>
        </div>
      </div>

      <!-- Action Submission Interface Footprint Row -->
      <div class="d-flex justify-content-end gap-2 border-top pt-3">
        <button type="button" [routerLink]="['/dashboard', 'roles']" class="btn btn-light rounded-3 px-4 py-2 fw-semibold fs-7 border shadow-none">
          Cancel
        </button>
        <button type="submit" [disabled]="isSubmitting" class="btn btn-primary rounded-3 px-4 py-2 fw-semibold fs-7 shadow-none text-white d-flex align-items-center">
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          {{ isSubmitting ? 'Saving...' : 'Create Role Type' }}
        </button>
      </div>

    </form>
  </div>

</div>
