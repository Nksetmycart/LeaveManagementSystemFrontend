<div class="d-flex flex-column flex-shrink-0 p-3 bg-white border-end h-100 sidebar-container" style="width: 260px;">
  
  <!-- Header / Logo Section (Reduced Height) -->
  <div class="d-flex align-items-center pb-3 mb-2 border-bottom decoration-none">
    <!-- Blue App Logo (Scaled down to 38px) -->
    <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded-3 me-2.5" style="width: 38px; height: 38px;">
      <i class="bi bi-stars fs-5"></i>
    </div>
    <!-- Brand Title -->
    <div>
      <span class="fw-bold text-dark d-block lh-sm" style="font-size: 1.1rem;">LeaveFlow</span>
      <span class="text-muted text-uppercase fw-semibold tracking-wider" style="font-size: 0.68rem; letter-spacing: 0.05em;">HR Suite</span>
    </div>
  </div>

  <!-- Main Navigation Links (Tightened Gaps) -->
  <ul class="nav nav-pills flex-column mb-auto gap-1">
    <li class="nav-item">
      <a [routerLink]="['/dashboard']" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-grid-1x2 me-3 fs-5-custom"></i>
        <span class="fw-medium">Dashboard</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'approval']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-check2-square me-3 fs-5-custom"></i>
        <span class="fw-medium">Approvals</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'employees']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-people me-3 fs-5-custom"></i>
        <span class="fw-medium">Employees</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'departments']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-building me-3 fs-5-custom"></i>
        <span class="fw-medium">Departments</span>
      </a>
    </li>
    
    <!-- NEW: Roles Management -->
    <li>
      <a [routerLink]="['/dashboard',  'roles']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-shield-lock me-3 fs-5-custom"></i>
        <span class="fw-medium">Roles</span>
      </a>
    </li>

    <!-- NEW: Leave Types CRUD -->
    <li>
      <a [routerLink]="['/dashboard',  'leave-types']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-sliders me-3 fs-5-custom"></i>
        <span class="fw-medium">Leave Types</span>
      </a>
    </li>

    <!-- NEW: Leave Balance CRUD -->
    <li>
      <a [routerLink]="['/dashboard',  'leave-balance']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-wallet2 me-3 fs-5-custom"></i>
        <span class="fw-medium">Leave Balance</span>
      </a>
    </li>

    <li>
      <a [routerLink]="['/dashboard',  'holidays']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-tree me-3 fs-5-custom"></i>
        <span class="fw-medium">Holidays</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'apply-leave']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-clipboard-plus me-3 fs-5-custom"></i>
        <span class="fw-medium">Apply Leave</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'my-leaves']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-list-check me-3 fs-5-custom"></i>
        <span class="fw-medium">My Leaves</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'attendance']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-calendar3 me-3 fs-5-custom"></i>
        <span class="fw-medium">My Attendance</span>
      </a>
    </li>
    <li>
      <a [routerLink]="['/dashboard',  'profile']" routerLinkActive="active" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary">
        <i class="bi bi-person-circle me-3 fs-5-custom"></i>
        <span class="fw-medium">Profile</span>
      </a>
    </li>
  </ul>

  <!-- Footer Section (Reduced Height) -->
  <div class="pt-3 border-top">
    <a href="#" class="nav-link d-flex align-items-center py-2 px-3 rounded-3 text-secondary custom-logout">
      <i class="bi bi-box-arrow-right me-3 fs-5-custom"></i>
      <span class="fw-medium">Sign out</span>
    </a>
  </div>
</div>
