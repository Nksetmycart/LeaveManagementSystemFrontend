<div class="container-fluid p-0 page-container animate-fade-in">
  
  <!-- Header Title Section with Primary Action Button -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <span class="text-muted text-uppercase fw-bold tracking-wider fs-7 d-block mb-1" style="font-size: 0.7rem; letter-spacing: 0.08em;">Security & Access</span>
      <h1 class="fw-bold text-dark h2 mb-0">Roles</h1>
    </div>
    <!-- Action: Create a new security role mapping group -->
    <button (click)="navigateToAddRole()" class="btn btn-primary d-flex align-items-center px-3 py-2 rounded-3 fw-medium shadow-none text-white fs-6">
      <i class="bi bi-shield-plus me-2 fs-5"></i> Add role
    </button>
  </div>

  <!-- Responsive 3-Column Grid Layout -->
  <div class="row g-3">
    <div class="col-12 col-md-6 col-xl-4" *ngFor="let role of roleList">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-3 role-card d-flex flex-column justify-content-between">
        
        <!-- Top Metadata & Context Info -->
        <div class="w-100 mb-3">
          <div class="d-flex align-items-start justify-content-between">
            <div class="d-flex align-items-center overflow-hidden">
              <!-- Soft Purple Shield Icon Badge -->
              <div class="icon-badge rounded-3 bg-purple-subtle d-flex align-items-center justify-content-center me-3 flex-shrink-0">
                <i class="bi bi-shield-lock fs-5"></i>
              </div>

              <!-- Role Header Info -->
              <div class="overflow-hidden">
                <h3 class="fw-bold text-dark mb-0 fs-6 text-truncate">{{ role.name }}</h3>
                <span class="text-secondary d-block fs-7">{{ role.userCount }} assigned {{ role.userCount === 1 ? 'user' : 'users' }}</span>
              </div>
            </div>

            <!-- Right: Delete Action Trash Button -->
            <button (click)="deleteRole(role); $event.stopPropagation()" class="btn btn-link text-muted p-2 rounded-circle border-0 action-trash shadow-none flex-shrink-0">
              <i class="bi bi-trash3 fs-6"></i>
            </button>
          </div>

          <!-- Permissions Tags Block -->
          <div class="mt-3">
            <label class="text-muted text-uppercase fw-bold d-block meta-label mb-2">Key Permissions</label>
            <div class="d-flex flex-wrap gap-1">
              <span *ngFor="let perm of role.permissions" class="badge bg-light text-secondary border px-2 py-1 fs-8 rounded-2">
                {{ perm }}
              </span>
            </div>
          </div>
        </div>

        <!-- Bottom Actions Panel Controls -->
        <div class="d-flex gap-2 border-top pt-2 mt-auto">
          <button (click)="viewRoleDetails(role)" class="btn btn-light btn-sm flex-grow-1 rounded-2 fw-semibold fs-7 py-2 action-btn-view shadow-none border">
            <i class="bi bi-eye me-1.5"></i> View Details
          </button>
          <button (click)="updateRole(role)" class="btn btn-outline-primary btn-sm flex-grow-1 rounded-2 fw-semibold fs-7 py-2 action-btn-update shadow-none">
            <i class="bi bi-pencil me-1.5"></i> Update
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
