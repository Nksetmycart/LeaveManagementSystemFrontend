<div class="container-fluid p-0 page-container animate-fade-in">
  
  <!-- Header Title Section with Primary Action Button -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <span class="text-muted text-uppercase fw-bold tracking-wider fs-7 d-block mb-1" style="font-size: 0.7rem; letter-spacing: 0.08em;">Calendar</span>
      <h1 class="fw-bold text-dark h2 mb-0">Company holidays</h1>
    </div>
    <button class="btn btn-primary d-flex align-items-center px-3 py-2 rounded-3 fw-medium shadow-none text-white fs-6">
      <i class="bi bi-plus-lg me-2"></i> Add holiday
    </button>
  </div>

  <!-- Responsive Grid Layout -->
  <div class="row g-3">
    <div class="col-12 col-md-6 col-xl-4" *ngFor="let holiday of holidayList">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-3 holiday-card">
        <div class="d-flex align-items-center justify-content-between w-100">
          
          <!-- Left: Icon and Details Context -->
          <div class="d-flex align-items-center overflow-hidden">
            <!-- Soft Purple Icon Badge -->
            <div class="icon-badge rounded-3 d-flex align-items-center justify-content-center me-3 flex-shrink-0">
              <i class="bi bi-tree fs-5"></i>
            </div>

            <div class="overflow-hidden">
              <h3 class="fw-bold text-dark mb-0 fs-6 text-truncate">{{ holiday.name }}</h3>
              <div class="d-flex align-items-center flex-wrap gap-2 mt-0.5">
                <span class="text-secondary fs-7 text-nowrap">{{ holiday.formattedDate }}</span>
                <span 
                  class="badge px-2 py-0.5 text-uppercase fw-bold badge-custom fs-8"
                  [ngClass]="holiday.type === 'PUBLIC' ? 'bg-light text-secondary border' : 'bg-primary-subtle text-primary'">
                  {{ holiday.type }}
                </span>
              </div>
            </div>
          </div>

          <!-- Right: Delete Action Trash Button -->
          <button class="btn btn-link text-muted p-2 rounded-circle border-0 action-trash shadow-none flex-shrink-0">
            <i class="bi bi-trash3 fs-6"></i>
          </button>

        </div>
      </div>
    </div>
  </div>

</div>
