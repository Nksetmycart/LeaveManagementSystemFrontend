<div class="container-fluid p-0 page-container animate-fade-in">
  
  <!-- Header Section with Primary Action Button -->
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div>
      <span class="text-muted text-uppercase fw-bold tracking-wider fs-7 d-block mb-1" style="font-size: 0.7rem; letter-spacing: 0.08em;">People</span>
      <h1 class="fw-bold text-dark h2 mb-0">Employees</h1>
    </div>
    <!-- Action: Navigate to Add Employee Page -->
    <button (click)="navigateToAddEmployee()" class="btn btn-primary d-flex align-items-center px-3 py-2 rounded-3 fw-medium shadow-none text-white fs-6">
      <i class="bi bi-person-plus me-2 fs-5"></i> Add employee
    </button>
  </div>

  <!-- Dynamic Responsive Grid Layout -->
  <div class="row g-3">
    <div class="col-12 col-md-6 col-xl-4" *ngFor="let emp of employeeList">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-3 employee-card d-flex flex-column justify-content-between">
        
        <!-- Top Profile Row Content -->
        <div class="d-flex align-items-center mb-3">
          <!-- Profile Image / Initials Ring Avatar -->
          <div class="flex-shrink-0 me-3">
            <img 
              *ngIf="emp.avatarUrl; else initialsBlock" 
              [src]="emp.avatarUrl" 
              [alt]="emp.name" 
              class="rounded-circle object-fit-cover avatar-size border">
            
            <ng-template #initialsBlock>
              <div class="avatar-size rounded-circle bg-primary-subtle text-primary fw-bold d-flex align-items-center justify-content-center fs-6">
                {{ emp.initials }}
              </div>
            </ng-template>
          </div>

          <!-- Description Identity Fields -->
          <div class="overflow-hidden">
            <h3 class="fw-bold text-dark mb-0 fs-6 text-truncate">{{ emp.name }}</h3>
            <span class="text-secondary d-block fs-7 text-truncate mb-1">{{ emp.role }}</span>
            <span class="text-muted text-uppercase fw-semibold tracking-wider font-monospace d-block text-truncate fs-8">
              {{ emp.department }} • {{ emp.clearance }}
            </span>
          </div>
        </div>

        <!-- Bottom Actions Row Panel -->
        <div class="d-flex gap-2 border-top pt-2 mt-auto">
          <button (click)="viewDetails(emp)" class="btn btn-light btn-sm flex-grow-1 rounded-2 fw-semibold fs-7 py-2 action-btn-view shadow-none border">
            <i class="bi bi-eye me-1.5"></i> View Details
          </button>
          <button (click)="updateEmployee(emp)" class="btn btn-outline-primary btn-sm flex-grow-1 rounded-2 fw-semibold fs-7 py-2 action-btn-update shadow-none">
            <i class="bi bi-pencil me-1.5"></i> Update
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
